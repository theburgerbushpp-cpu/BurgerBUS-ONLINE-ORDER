version: '3.8'

services:
  burgerbus:
    image: node:20-alpine
    container_name: burgerbus-online-order
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - CLOVER_MERCHANT_ID=${CLOVER_MERCHANT_ID}
      - CLOVER_API_TOKEN=${CLOVER_API_TOKEN}
      - CLOVER_MODE=${CLOVER_MODE:-production}
      - PORT=3000
      - NODE_ENV=production
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm start"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
